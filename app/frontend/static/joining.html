<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в лобби</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .main-container {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Отступ между блоками */
        }

        .item-container {
            display: flex;
            flex-direction: column;
            gap: 5px; /* Отступ между подписью и самим элементом */
        }

        .meta-label {
            font-size: 12px;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        input {
            padding: 12px;
            background-color: #a7f3b6; /* Светло-зеленый фон */
            border: none;
            color: #000;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #000; /* Темный цвет текста-подсказки, как на макете */
        }

        input:focus {
            outline: 2px solid #555;
        }

        button {
            padding: 15px;
            background-color: #c0d8fa; /* Светло-синий фон */
            border: 1px solid #333; /* Тонкая темная рамка */
            color: #000;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        button:hover {
            background-color: #a8c8f8; /* Легкое затемнение при наведении */
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="item-container">
        <input type="text" id="nickname" placeholder="Введите никнейм...">
    </div>

    <div class="item-container">
        <button type="submit">Войти в лобби</button>
    </div>
</div>

</body>
</html>
