<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Присоединиться или Создать игру</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUa6Y5Y6Qm3b1y0v2Qm9Q5F1h4u7mZx1q6Y5r9V1p5W9QeF5N6G1s7z3y1vV" crossorigin="anonymous">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .main-container {
            width: 320px; /* Умеренная ширина для контейнера */
            display: flex;
            flex-direction: column;
            gap: 20px; /* Отступ между блоками */
            text-align: center;
        }

        .item-container {
            display: flex;
            flex-direction: column;
            gap: 5px; /* Отступ между меткой и элементом */
        }

        input {
            padding: 12px;
            background-color: #d8f1d8; /* Светло-зеленый фон */
            border: none;
            color: #000;
            font-size: 16px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box; /* Чтобы padding не влиял на ширину */
        }

        input::placeholder {
            color: #333; /* Сделать плейсхолдер темнее */
        }

        /* Стилевой режим только для кнопки отправки формы и для ссылок .btn
           чтобы не переопределять Bootstrap close-button (.btn-close) */
        button[type="submit"], .btn {
            padding: 15px;
            background-color: #d1e2f3; /* Светло-голубой фон */
            border: none;
            color: #000;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none; /* Убрать подчеркивание для ссылки */
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        button[type="submit"]:hover, .btn:hover {
            background-color: #b9d1e8; /* Эффект наведения */
        }

        /* Сброс стилей для кнопки закрытия Bootstrap */
        .btn-close {
            width: 1.25rem;
            height: 1.25rem;
            padding: 0;
            background: transparent;
        }

        #message {
            font-size: 14px;
            color: #222;
            min-height: 18px;
        }

        /* Красная окантовка для невалидного поля */
        .input-invalid {
            border: 2px solid #dc3545 !important; /* Bootstrap danger color */
            box-shadow: 0 0 0 0.2rem rgba(220,53,69,.25);
        }
    </style>
</head>
<body>

<div class="main-container">
    <form action="/api/" method="post">
      <div class="item-container">
          <!-- alert элемент больше не используется визуально -->
          <div id="flash" style="display:none"></div>
      </div>

      <div class="item-container">
          <input type="text" name="game_code" id="game_code" placeholder="Введите код...">
      </div>

      <div class="item-container">
          <button type="submit" id="joinBtn">Присоединиться</button>
      </div>
    </form>

    <div class="item-container">
        <form action="/api/create" method="post" style="width:100%;">
          <button type="submit" class="btn">Создать игру</button>
        </form>
    </div>

    <!-- вспомогательный элемент (для совместимости) -->
    <div class="item-container">
        <div id="message" aria-live="polite" style="display:none"></div>
    </div>
</div>

<!-- Bootstrap JS (bundle includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
(function(){
  // helper: получить cookie по имени
  const readCookie = (name) => {
    const c = document.cookie.split(';').map(s=>s.trim()).find(s=>s.startsWith(name+'='));
    if (!c) return null;
    return decodeURIComponent(c.split('=')[1] || '');
  };
  const delCookie = (name) => { document.cookie = name + '=; Path=/; Max-Age=0; SameSite=Lax'; };

  const cookie = readCookie('flash');
  if (cookie === 'notfound') {
    const input = document.getElementById('game_code');
    if (input) {
      input.classList.add('input-invalid');
      // удалить cookie сразу
      delCookie('flash');
      // снять подсветку через 5 секунд
      setTimeout(() => input.classList.remove('input-invalid'), 5000);
    } else {
      delCookie('flash');
    }
  }
})();
</script>
</body>
</html>
