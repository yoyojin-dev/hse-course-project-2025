<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мультикомандный Featureban</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --line: #d5deea;
            --accent: #2c67bd;
            --text: #1a2230;
            --muted: #5e6979;
            --ok: #146c2e;
            --warn: #8a6100;
            --err: #b42318;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top right, #e8f1ff, var(--bg) 50%);
        }
        .container {
            max-width: 1280px;
            margin: 18px auto;
            padding: 0 14px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .title { margin: 0; font-size: 22px; }
        .meta { color: var(--muted); font-size: 14px; }
        .badge {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 12px;
            background: #fff;
        }
        .badge.turn { border-color: #8cb3ee; color: #1553ac; }
        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .columns {
            display: grid;
            grid-template-columns: repeat(4, minmax(110px, 1fr));
            gap: 8px;
        }
        .col {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fbfcff;
            padding: 8px;
            min-height: 120px;
        }
        .col h4 { margin: 0 0 8px; font-size: 13px; color: #3d4c65; }
        .task {
            border: 1px solid #c8d7eb;
            background: #eef5ff;
            border-radius: 8px;
            padding: 6px;
            font-size: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: transform .16s ease, box-shadow .16s ease, background-color .2s ease, opacity .16s ease;
            transform-origin: center;
        }
        .task:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(24, 58, 112, 0.12); }
        .task.sel { outline: 2px solid #2f6dc6; }
        .task.dragging {
            opacity: .45;
            transform: scale(0.98);
            box-shadow: 0 8px 22px rgba(33, 73, 134, 0.24);
        }
        .task.flash {
            animation: task-drop .5s ease;
        }
        .task.blocked {
            background: #fff3f1;
            border-color: #e2aaa4;
        }
        .task-owner {
            display: block;
            margin-top: 4px;
            color: #50607a;
            font-size: 11px;
        }
        .task-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
        }
        .task-btn {
            border: 1px solid #9ab0d6;
            background: #f7fbff;
            color: #2d4670;
            border-radius: 6px;
            padding: 3px 7px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        .task-btn:disabled {
            opacity: .55;
            cursor: default;
        }
        .col.drop-target {
            border-color: #5a8cd7;
            background: #f2f8ff;
            box-shadow: inset 0 0 0 1px #84ace8;
        }
        @keyframes task-drop {
            0% { transform: scale(0.96); background-color: #dcecff; }
            100% { transform: scale(1); background-color: #eef5ff; }
        }
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        .project {
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 8px;
            background: #fbfdff;
        }
        .project.started { border-color: #9ec0f0; }
        .project.done { border-color: #96d3a7; background: #f2fff6; }
        .project-title { font-weight: 700; margin-bottom: 6px; font-size: 13px; }
        .project-meta { color: var(--muted); font-size: 12px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        button {
            border: 1px solid #4f6fa8;
            background: #d9e7ff;
            border-radius: 8px;
            padding: 8px 10px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: .65; cursor: default; }
        select, input {
            border: 1px solid #9db6db;
            border-radius: 8px;
            padding: 7px;
        }
        .status { min-height: 20px; font-size: 14px; }
        .status.ok { color: var(--ok); }
        .status.err { color: var(--err); }
        .history {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 280px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history li {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px;
            font-size: 13px;
            background: #fff;
        }
        @media (min-width: 1020px) {
            .layout { grid-template-columns: 1.25fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card header">
        <div>
            <h1 class="title">Мультикомандный Featureban: <span id="gameCode">...</span></h1>
            <div class="meta" id="metaLine"></div>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <span class="badge" id="roleBadge">Роль: ...</span>
            <span class="badge" id="phaseBadge">Фаза: ...</span>
            <span class="badge turn" id="turnBadge">Ход: ...</span>
        </div>
    </div>

    <div class="layout">
        <div class="card">
            <h2 style="margin-top:0;">Командные доски</h2>
            <div id="teamsContainer"></div>
            <div class="actions">
                <button id="moveBtn" type="button">Сделать ход (монетка)</button>
                <button id="refreshBtn" type="button">Обновить</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div style="display:grid; gap:14px;">
            <div class="card">
                <h2 style="margin-top:0;">Панель ведущего</h2>
                <div id="facilitatorPanel"><div class="meta">Доступно только ведущему.</div></div>
            </div>

            <div class="card">
                <h2 style="margin-top:0;">Проектная доска</h2>
                <div class="projects" id="projects"></div>
            </div>

            <div class="card">
                <h2 style="margin-top:0;">История</h2>
                <ul class="history" id="history"></ul>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    const parts = window.location.pathname.split('/').filter(Boolean);
    const gameCode = parts[parts.length - 1] || '';
    const params = new URLSearchParams(window.location.search);
    const playerId = params.get('player_id') || '';

    const gameCodeEl = document.getElementById('gameCode');
    const metaLineEl = document.getElementById('metaLine');
    const roleBadgeEl = document.getElementById('roleBadge');
    const phaseBadgeEl = document.getElementById('phaseBadge');
    const turnBadgeEl = document.getElementById('turnBadge');
    const teamsEl = document.getElementById('teamsContainer');
    const projectsEl = document.getElementById('projects');
    const historyEl = document.getElementById('history');
    const facilitatorPanelEl = document.getElementById('facilitatorPanel');
    const statusEl = document.getElementById('status');
    const moveBtn = document.getElementById('moveBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    let state = null;
    let busy = false;
    let selectedTaskId = '';
    let draggingTaskId = '';
    let draggingFromStage = '';
    let draggingTeamId = '';
    let flashTaskId = '';

    gameCodeEl.textContent = gameCode || 'unknown';

    function setStatus(msg, type) {
        statusEl.textContent = msg || '';
        statusEl.classList.remove('ok', 'err');
        if (type) statusEl.classList.add(type);
    }

    function playerRecord() {
        if (!state) return null;
        for (const team of state.teams || []) {
            for (const p of team.members || []) {
                if (p.id === playerId) return p;
            }
        }
        if (state.facilitator_id === playerId) {
            return { id: playerId, role: 'facilitator', nickname: 'facilitator' };
        }
        return null;
    }

    function isFacilitator() {
        return state && state.facilitator_id === playerId;
    }

    function postJSON(url, body) {
        return fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(body || {})
        }).then(async (res) => {
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.error || 'Ошибка запроса');
            }
            return data;
        });
    }

    function renderMeta() {
        if (!state) return;
        const me = playerRecord();
        const role = me ? (me.role === 'facilitator' ? 'Ведущий' : 'Игрок') : 'Наблюдатель';
        const meName = me && me.nickname ? me.nickname : playerId || 'без id';

        roleBadgeEl.textContent = 'Роль: ' + role + ' (' + meName + ')';
        phaseBadgeEl.textContent = 'Фаза: ' + state.phase;

        if (state.phase === 'running' && state.current_turn_team_name) {
            turnBadgeEl.textContent = 'Ход команды: ' + state.current_turn_team_name;
        } else {
            turnBadgeEl.textContent = 'Ход: -';
        }

        const coinMeta = state.current_coin ? (', монетка: ' + state.current_coin) : '';
        metaLineEl.textContent = 'День ' + state.current_day + ' из ' + state.max_days + ', завершено проектов: ' + state.projects_done + '/' + (state.projects || []).length + ', циклов ретро: ' + state.cycles_completed + coinMeta;
    }

    function renderTeams() {
        teamsEl.innerHTML = '';
        if (!state) return;

        (state.teams || []).forEach((team) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.marginBottom = '10px';

            const title = document.createElement('div');
            title.style.display = 'flex';
            title.style.justifyContent = 'space-between';
            title.style.alignItems = 'center';
            title.style.marginBottom = '8px';
            title.innerHTML = '<strong>' + team.name + '</strong> <span class="meta">WIP=' + team.wip_limit + ', участников: ' + (team.members || []).length + '</span>';
            card.appendChild(title);

            const members = document.createElement('div');
            members.className = 'meta';
            members.style.marginBottom = '8px';
            members.textContent = 'Участники: ' + (team.members || []).map((m) => m.nickname).join(', ');
            card.appendChild(members);

            const cols = document.createElement('div');
            cols.className = 'columns';

            ['ready', 'in_progress', 'review', 'done'].forEach((stage) => {
                const col = document.createElement('div');
                col.className = 'col';
                col.dataset.teamId = team.id;
                col.dataset.stage = stage;
                const h = document.createElement('h4');
                h.textContent = stage + ' (' + (team.counts && team.counts[stage] ? team.counts[stage] : 0) + ')';
                col.appendChild(h);

                col.addEventListener('dragover', (e) => {
                    if (!draggingTaskId || busy) return;
                    e.preventDefault();
                });
                col.addEventListener('dragenter', (e) => {
                    if (!draggingTaskId || busy) return;
                    e.preventDefault();
                    col.classList.add('drop-target');
                });
                col.addEventListener('dragleave', () => {
                    col.classList.remove('drop-target');
                });
                col.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    col.classList.remove('drop-target');
                    if (!draggingTaskId || busy) return;
                    if (draggingTeamId !== team.id) {
                        setStatus('Нельзя переносить задачи между командами.', 'err');
                        return;
                    }
                    const toStage = col.dataset.stage || '';
                    if (!toStage) return;

                    try {
                        busy = true;
                        const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/drag', {
                            player_id: playerId,
                            task_id: draggingTaskId,
                            to_stage: toStage
                        });
                        state = data;
                        const movedTaskId = draggingTaskId;
                        flashTaskId = movedTaskId;
                        setStatus('Карточка перемещена.', 'ok');
                        render();
                        setTimeout(() => {
                            if (flashTaskId === movedTaskId) {
                                flashTaskId = '';
                                render();
                            }
                        }, 550);
                    } catch (err) {
                        setStatus(err.message, 'err');
                    } finally {
                        busy = false;
                        draggingTaskId = '';
                        draggingFromStage = '';
                        draggingTeamId = '';
                        render();
                    }
                });

                (team.board && team.board[stage] ? team.board[stage] : []).forEach((task) => {
                    const t = document.createElement('div');
                    const canDrag = !!playerId && !busy && state.phase === 'running' && state.current_turn_team_id === team.id;
                    const canAct = !!playerId && !busy && state.phase === 'running' && state.current_turn_team_id === team.id;
                    t.className = 'task'
                        + (task.blocked ? ' blocked' : '')
                        + (selectedTaskId === task.id ? ' sel' : '')
                        + (flashTaskId === task.id ? ' flash' : '');
                    t.draggable = canDrag;
                    t.innerHTML = '<strong>' + task.id + '</strong> / ' + task.project_id + (task.blocked ? ' [blocked]' : '');
                    const owner = task.owner_id ? task.owner_id : 'свободна';
                    const ownerHint = document.createElement('span');
                    ownerHint.className = 'task-owner';
                    ownerHint.textContent = 'Ответственный: ' + owner;
                    t.appendChild(ownerHint);

                    const actions = document.createElement('div');
                    actions.className = 'task-actions';
                    const blockBtn = document.createElement('button');
                    blockBtn.type = 'button';
                    blockBtn.className = 'task-btn';
                    blockBtn.textContent = task.blocked ? 'Разблокировать' : 'Заблокировать';
                    blockBtn.disabled = !canAct;
                    blockBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        try {
                            busy = true;
                            const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/drag', {
                                player_id: playerId,
                                task_id: task.id,
                                to_stage: task.stage
                            });
                            state = data;
                            flashTaskId = task.id;
                            setStatus('Статус блокировки обновлен.', 'ok');
                            render();
                            setTimeout(() => {
                                if (flashTaskId === task.id) {
                                    flashTaskId = '';
                                    render();
                                }
                            }, 550);
                        } catch (err) {
                            setStatus(err.message, 'err');
                        } finally {
                            busy = false;
                            render();
                        }
                    });
                    actions.appendChild(blockBtn);
                    t.appendChild(actions);
                    t.title = 'Team: ' + task.team_id + ', stage: ' + task.stage + ', blocked: ' + (task.blocked ? 'yes' : 'no') + ', owner: ' + owner;
                    t.addEventListener('click', () => {
                        selectedTaskId = selectedTaskId === task.id ? '' : task.id;
                        render();
                    });
                    t.addEventListener('dragstart', (e) => {
                        draggingTaskId = task.id;
                        draggingFromStage = stage;
                        draggingTeamId = team.id;
                        t.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', task.id);
                    });
                    t.addEventListener('dragend', () => {
                        t.classList.remove('dragging');
                        draggingTaskId = '';
                        draggingFromStage = '';
                        draggingTeamId = '';
                        document.querySelectorAll('.col.drop-target').forEach((c) => c.classList.remove('drop-target'));
                    });
                    col.appendChild(t);
                });

                cols.appendChild(col);
            });

            card.appendChild(cols);
            teamsEl.appendChild(card);
        });
    }

    function renderProjects() {
        projectsEl.innerHTML = '';
        (state.projects || []).forEach((p) => {
            const div = document.createElement('div');
            div.className = 'project' + (p.completed ? ' done' : (p.started ? ' started' : ''));

            const title = document.createElement('div');
            title.className = 'project-title';
            title.textContent = p.name + ' (' + p.id + ')';
            div.appendChild(title);

            const meta = document.createElement('div');
            meta.className = 'project-meta';
            meta.textContent = 'Статус: ' + (p.completed ? 'done' : (p.started ? 'in progress' : 'backlog')) + ', задачи: ' + p.done_tasks + '/' + p.total_tasks;
            div.appendChild(meta);

            projectsEl.appendChild(div);
        });
    }

    function renderHistory() {
        historyEl.innerHTML = '';
        const arr = state.history || [];
        for (let i = arr.length - 1; i >= 0; i--) {
            const h = arr[i];
            const li = document.createElement('li');
            li.textContent = '[day ' + h.day + '] ' + h.category + ': ' + h.message;
            historyEl.appendChild(li);
        }
        if (!arr.length) {
            const li = document.createElement('li');
            li.textContent = 'История пустая.';
            historyEl.appendChild(li);
        }
    }

    function renderFacilitatorPanel() {
        facilitatorPanelEl.innerHTML = '';
        if (!isFacilitator()) {
            facilitatorPanelEl.innerHTML = '<div class="meta">Вы не ведущий этой игры.</div>';
            return;
        }

        const wrap = document.createElement('div');
        wrap.className = 'actions';

        const startBtn = document.createElement('button');
        startBtn.textContent = 'Старт игры';
        startBtn.disabled = busy || state.started;
        startBtn.addEventListener('click', async () => {
            try {
                busy = true;
                const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/start', { player_id: playerId });
                state = data;
                setStatus('Игра запущена.', 'ok');
                render();
            } catch (e) {
                setStatus(e.message, 'err');
            } finally {
                busy = false;
                render();
            }
        });
        wrap.appendChild(startBtn);

        const projectSelect = document.createElement('select');
        (state.projects || []).forEach((p) => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name + ' (' + (p.started ? 'started' : 'backlog') + ')';
            projectSelect.appendChild(opt);
        });
        wrap.appendChild(projectSelect);

        const startProjectBtn = document.createElement('button');
        startProjectBtn.textContent = 'Запустить проект';
        startProjectBtn.disabled = busy;
        startProjectBtn.addEventListener('click', async () => {
            try {
                busy = true;
                const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/start_project', {
                    player_id: playerId,
                    project_id: projectSelect.value
                });
                state = data;
                setStatus('Проект запущен.', 'ok');
                render();
            } catch (e) {
                setStatus(e.message, 'err');
            } finally {
                busy = false;
                render();
            }
        });
        wrap.appendChild(startProjectBtn);

        const skipTurnBtn = document.createElement('button');
        skipTurnBtn.textContent = 'Пропустить текущий ход';
        skipTurnBtn.disabled = busy || state.phase !== 'running' || !state.current_turn_team_id;
        skipTurnBtn.addEventListener('click', async () => {
            try {
                busy = true;
                const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/skip_turn', { player_id: playerId });
                state = data;
                setStatus('Ход пропущен ведущим.', 'ok');
                render();
            } catch (e) {
                setStatus(e.message, 'err');
            } finally {
                busy = false;
                render();
            }
        });
        wrap.appendChild(skipTurnBtn);

        facilitatorPanelEl.appendChild(wrap);

        const retroWrap = document.createElement('div');
        retroWrap.className = 'actions';
        retroWrap.style.marginTop = '8px';

        const teamSelect = document.createElement('select');
        (state.teams || []).forEach((t) => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = t.name;
            teamSelect.appendChild(opt);
        });
        retroWrap.appendChild(teamSelect);

        const wipInput = document.createElement('input');
        wipInput.type = 'number';
        wipInput.min = '1';
        wipInput.max = '10';
        wipInput.value = '2';
        wipInput.style.width = '84px';
        retroWrap.appendChild(wipInput);

        const setWipBtn = document.createElement('button');
        setWipBtn.textContent = 'Изменить WIP';
        setWipBtn.disabled = busy || state.phase !== 'retro';
        setWipBtn.addEventListener('click', async () => {
            try {
                busy = true;
                const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/set_wip', {
                    player_id: playerId,
                    team_id: teamSelect.value,
                    wip_limit: Number(wipInput.value || '2')
                });
                state = data;
                setStatus('WIP обновлен.', 'ok');
                render();
            } catch (e) {
                setStatus(e.message, 'err');
            } finally {
                busy = false;
                render();
            }
        });
        retroWrap.appendChild(setWipBtn);

        const continueBtn = document.createElement('button');
        continueBtn.textContent = 'Завершить ретро и продолжить';
        continueBtn.disabled = busy || state.phase !== 'retro';
        continueBtn.addEventListener('click', async () => {
            try {
                busy = true;
                const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/continue', { player_id: playerId });
                state = data;
                setStatus('Ретро завершено.', 'ok');
                render();
            } catch (e) {
                setStatus(e.message, 'err');
            } finally {
                busy = false;
                render();
            }
        });
        retroWrap.appendChild(continueBtn);
        facilitatorPanelEl.appendChild(retroWrap);
    }

    function renderMoveButton() {
        const me = playerRecord();
        const myTeam = me && me.team_id ? me.team_id : '';
        const canMove = !!me && me.role === 'player' && state.phase === 'running' && state.current_turn_team_id === myTeam && !busy && !state.current_coin;
        moveBtn.disabled = !canMove;
    }

    function render() {
        if (!state) return;
        renderMeta();
        renderTeams();
        renderProjects();
        renderHistory();
        renderFacilitatorPanel();
        renderMoveButton();
    }

    async function loadState(silent) {
        try {
            const res = await fetch('/api/game/' + encodeURIComponent(gameCode), { headers: { 'Accept': 'application/json' } });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                if (!silent) setStatus(data.error || 'Ошибка загрузки состояния.', 'err');
                return;
            }
            state = data;
            if (!silent) setStatus('Состояние обновлено.', 'ok');
            render();
        } catch (e) {
            if (!silent) setStatus('Сервер недоступен.', 'err');
        }
    }

    moveBtn.addEventListener('click', async () => {
        try {
            busy = true;
            const payload = { player_id: playerId };
            if (selectedTaskId) payload.task_id = selectedTaskId;
            const data = await postJSON('/api/game/' + encodeURIComponent(gameCode) + '/move', payload);
            state = data;
            selectedTaskId = '';
            setStatus('Ход выполнен.', 'ok');
            render();
        } catch (e) {
            setStatus(e.message, 'err');
        } finally {
            busy = false;
            render();
        }
    });

    refreshBtn.addEventListener('click', () => loadState(false));

    loadState(false);
    setInterval(() => loadState(true), 2500);
})();
</script>
</body>
</html>
